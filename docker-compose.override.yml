services:
  app:
    build:
      target: development
    image: gescom-wpp-service:dev
    command: npm run dev
    #Utiliza o arquivo .env.docker.development para o ambiente de desenvolvimento
    env_file:
      - .env.docker.development
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app_net

volumes:
  app_node_modules:
  redis_data:
