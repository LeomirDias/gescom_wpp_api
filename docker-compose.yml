services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: gescom-wpp-service:base
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
